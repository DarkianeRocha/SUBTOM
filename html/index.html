<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SUBTOM</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">

</head>

<body class="bg-zinc-950 text-zinc-100">

<main class="min-h-screen flex flex-col justify-center items-center px-6">

    <header class="text-center mb-10">

        <h1 class="text-6xl font-bold tracking-widest">
            SUBTOM
        </h1>

        <p class="mt-5 text-zinc-400 text-lg">
            Nem toda cor nasce da luz.
            Algumas revelam sua essência na escuridão.
        </p>

    </header>

    <section class="w-full max-w-4xl bg-zinc-900 rounded-xl border border-zinc-800 shadow-xl p-8">

        <div class="flex flex-col md:flex-row gap-4">

            <input
                id="inputCor"
                type="text"
                placeholder="Digite um código HEX (Ex: 7C3AED)"
                class="flex-1 bg-zinc-950 border border-zinc-700 rounded-lg p-4 focus:outline-none focus:border-red-700">

            <button
                id="btnBuscar"
                class="bg-red-950 hover:bg-red-800 duration-300 rounded-lg px-8">

                REVELAR

            </button>

        </div>

        <p id="mensagem" class="mt-5 text-center text-zinc-400"></p>

        <section id="resultado" class="hidden mt-10">

            <div class="grid md:grid-cols-2 gap-8">

                <div>

                    <div
                        id="cor"
                        class="h-64 rounded-lg border border-zinc-700">

                    </div>

                </div>

                <div class="space-y-4">

                    <div>

                        <h2 class="uppercase text-sm text-zinc-500">Nome</h2>
                        <p id="nome" class="text-2xl"></p>

                    </div>

                    <div>

                        <h2 class="uppercase text-sm text-zinc-500">HEX</h2>
                        <p id="hex"></p>

                    </div>

                    <div>

                        <h2 class="uppercase text-sm text-zinc-500">RGB</h2>
                        <p id="rgb"></p>

                    </div>

                    <div>

                        <h2 class="uppercase text-sm text-zinc-500">HSL</h2>
                        <p id="hsl"></p>

                    </div>

                    <div>

                        <h2 class="uppercase text-sm text-zinc-500">CMYK</h2>
                        <p id="cmyk"></p>

                    </div>

                    <button
                        id="btnCopiar"
                        class="bg-zinc-800 hover:bg-zinc-700 duration-300 rounded-lg px-6 py-3 w-full">

                        Copiar HEX

                    </button>

                </div>

            </div>

            <div class="mt-10">

                <h2 class="uppercase text-sm text-zinc-500 mb-4">
                    Paleta de Tons
                </h2>

                <div
                    id="paleta"
                    class="grid grid-cols-5 gap-3">

                </div>

            </div>

        </section>

    </section>

    <footer class="mt-12 text-center text-zinc-600">

        <p>SUBTOM © 2026</p>

        <p class="mt-2 text-sm">
            Explorando a identidade oculta das cores.
        </p>

    </footer>

</main>

<script src="../js/script.js"></script>

</body>
</html>
